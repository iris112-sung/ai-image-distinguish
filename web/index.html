<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Image Probability</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="AI image classifier">
        <div class="brand">
          <p class="eyebrow">CNN Image Classifier</p>
          <h1>AI 이미지 확률 분석</h1>
        </div>

        <label class="dropzone" id="dropzone">
          <input id="file-input" type="file" accept="image/*" />
          <span class="drop-title">사진 선택</span>
          <span class="drop-meta">JPG, PNG, WebP</span>
        </label>

        <div class="result-grid">
          <div class="preview-panel">
            <img id="preview" alt="" />
            <div id="empty-preview" class="empty-preview">이미지 미리보기</div>
          </div>

          <section class="score-panel" aria-live="polite">
            <div class="score-topline">
              <span id="status">모델 준비 중</span>
              <span id="verdict">-</span>
            </div>

            <div class="meter" aria-label="AI probability">
              <div id="meter-fill" class="meter-fill"></div>
            </div>

            <div class="score-number">
              <span id="ai-score">--</span>
              <span>% AI</span>
            </div>

            <div class="probabilities">
              <div>
                <span>FAKE</span>
                <strong id="fake-prob">--</strong>
              </div>
              <div>
                <span>REAL</span>
                <strong id="real-prob">--</strong>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
